<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="logo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Opificio del Gusto - Galleria</title>
</head>
<body>

  <header class="hero">
    <div data-aos="fade-zoom-in" data-aos-duration="800" data-aos-easing="ease-in">
      <div id="container" class="hero-content"></div>
    </div>
  </header>

  <section class="section gallery-section">
    <div data-aos="fade-up" data-aos-duration="900">
      <h2>Galleria</h2>
      <p class="who">Un percorso tra cucina, dettagli e atmosfera di Opificio del Gusto.</p>
    </div>

    <div data-aos="fade-up" data-aos-delay="150" data-aos-duration="900">
      <h3 class="gallery-subtitle">I nostri piatti</h3>
      <div class="gallery-grid">
        <img src="piatto1.webp" alt="Piatto 1">
        <img src="piatto2.webp" alt="Piatto 2">
        <img src="piatto3.webp" alt="Piatto 3">
        <img src="piatto4.webp" alt="Piatto 4">
        <img src="piatto5.webp" alt="Piatto 5">
        <img src="piatto6.webp" alt="Piatto 6">
      </div>
    </div>

  <section class="section gallery-section gallery-section-second">
    <div data-aos="fade-up" data-aos-duration="900">
      <h3 class="gallery-subtitle">Il locale</h3>
      <div class="gallery-grid">
        <img src="locale1.webp" alt="Sala del ristorante">
        <img src="locale2.webp" alt="Dettaglio del locale">
        <img src="locale3.webp" alt="Tavoli del ristorante">
        <img src="locale4.webp" alt="Interni del locale">
        <img src="locale5.webp" alt="Ambiente del ristorante">
        <img src="locale6.webp" alt="Vista del locale">
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Opificio del Gusto</p>
  </footer>

  <script>
    AOS.init();
  </script>
</body>
</html>
