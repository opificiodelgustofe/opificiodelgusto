<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="logo.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <title>Opificio del Gusto - Galleria</title>
</head>
<body>

  <a href="index.html" aria-label="Torna alla home">
    <div class="title"></div>
  </a>

  <br><br>

  <section class="section gallery-section">
    <div data-aos="fade-up" data-aos-duration="900">
      <h2>Galleria</h2>
      <p class="who">Un percorso tra cucina, dettagli e atmosfera di Opificio del Gusto.</p>
    </div>

    <div data-aos="fade-up" data-aos-delay="150" data-aos-duration="900">
      <h3 class="gallery-subtitle">I nostri piatti</h3>

      <div class="gallery-grid">
        <figure class="gallery-item">
          <img src="piatto1.webp" alt="Gazpacho alle ciliegie con verdura e frutta di stagione" loading="lazy" decoding="async" width="800" height="600">
          <figcaption class="gallery-caption">Gazpacho alle ciliegie con verdura e frutta di stagione</figcaption>
        </figure>

        <figure class="gallery-item">
          <img src="piatto2.webp" alt="Tacos di Fassona Piemontese, salsa chimichurri, ravanelli" loading="lazy" decoding="async" width="800" height="600">
          <figcaption class="gallery-caption">Tacos di Fassona Piemontese, salsa chimichurri, ravanelli</figcaption>
        </figure>

        <figure class="gallery-item">
          <img src="piatto3.webp" alt="Tamales" loading="lazy" decoding="async" width="800" height="600">
          <figcaption class="gallery-caption">Tamales</figcaption>
        </figure>

        <figure class="gallery-item">
          <img src="piatto4.webp" alt="Ceviche di ricciola" loading="lazy" decoding="async" width="800" height="600">
          <figcaption class="gallery-caption">Ceviche di ricciola</figcaption>
        </figure>

        <figure class="gallery-item">
          <img src="piatto5.webp" alt="Cioccolato fondente, pistacchio, ciliegia, lamponi" loading="lazy" decoding="async" width="800" height="600">
          <figcaption class="gallery-caption">Cioccolato fondente, pistacchio, ciliegia, lamponi</figcaption>
        </figure>

        <figure class="gallery-item">
          <img src="piatto6.webp" alt="Frutto della passione, mango, menta" loading="lazy" decoding="async" width="800" height="600">
          <figcaption class="gallery-caption">Frutto della passione, mango, menta</figcaption>
        </figure>
      </div>
    </div>

  <section class="section gallery-section gallery-section-second">
    <div data-aos="fade-up" data-aos-duration="900">
      <h3 class="gallery-subtitle">Il locale</h3>

      <div class="gallery-grid">
        <img src="locale1.webp" alt="Sala del ristorante" loading="lazy" decoding="async" width="1200" height="800">
        <img src="locale2.webp" alt="Dettaglio del locale" loading="lazy" decoding="async" width="1200" height="800">
        <img src="locale3.webp" alt="Tavoli del ristorante" loading="lazy" decoding="async" width="1200" height="800">
        <img src="locale4.webp" alt="Interni del locale" loading="lazy" decoding="async" width="1200" height="800">
        <img src="locale5.webp" alt="Ambiente del ristorante" loading="lazy" decoding="async" width="1200" height="800">
        <img src="locale6.webp" alt="Vista del locale" loading="lazy" decoding="async" width="1200" height="800">
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Opificio del Gusto</p>
  </footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
